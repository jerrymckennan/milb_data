<html>
  <head>
    <style>
      table {
        border-style: hidden;
        border-collapse: collapse;
      }
      th, td {
        border: 1px solid black;
        border-radius: 10px;
        border-collapse: collapse;
        text-align: center;
        font-family: Georgia, serif;
      }
      tr:hover td {
        background-color: #D6EEEE;
      }
      tr.selected td {
        background-color: #D6EEEE;
      }
      .lak_bip_table {
        border-collapse: collapse;
      }
      h1 {
        font-family: Georgia, serif;
      }
    </style>
  </head>
  <body>
    <div class="LAK">
      <h1>Lakeland BIP data</h1>
      <input type="text" id="batter_input" onkeyup="batter_filter()" placeholder="Search for names.." title="Type in a name">
      <table border="0" id="lak_bip_table"></table>
      <script>
      fetch('lak_bip.json')
        .then(res => res.json())
        .then(data => {
          const table = document.getElementById('lak_bip_table');
          // Create header row
          const header = document.createElement('tr');
          Object.keys(data[0]).forEach(key => {
            const th = document.createElement('th');
            th.textContent = key;
            header.appendChild(th);
          });
          table.appendChild(header);
          // Create data rows
          data.forEach(item => {
            const row = document.createElement('tr');
            Object.values(item).forEach(value => {
              const td = document.createElement('td');
              td.textContent = value;
              row.appendChild(td);
            });
            table.appendChild(row);
          });
        });
      </script>
      <h1>Lakeland hit metrics</h1>
      <table border="0" id="lak_hit_metrics_table"></table>
      <script>
      fetch('lak_hit_metrics.json')
        .then(res => res.json())
        .then(data => {
          const table = document.getElementById('lak_hit_metrics_table');
          // Create header row
          const header = document.createElement('tr');
          Object.keys(data[0]).forEach(key => {
            const th = document.createElement('th');
            th.textContent = key;
            header.appendChild(th);
          });
          table.appendChild(header);
          // Create data rows
          data.forEach(item => {
            const row = document.createElement('tr');
            Object.values(item).forEach(value => {
              const td = document.createElement('td');
              td.textContent = value;
              row.appendChild(td);
            });
            table.appendChild(row);
          });
        });
      </script>
      <h1>Lakeland pitching metrics</h1>
      <input type="text" id="pitcher_input" onkeyup="pitcher_filter()" placeholder="Search for names.." title="Type in a name">
      <input type="text" id="pitch_input" onkeyup="pitch_filter()" placeholder="Search for pitches.." title="Type in a pitch">
      <table border="0" id="lak_pitch_metrics_table"></table>
      <script>
      fetch('lak_pitchers.json')
        .then(res => res.json())
        .then(data => {
          const table = document.getElementById('lak_pitch_metrics_table');
          // Create header row
          const header = document.createElement('tr');
          Object.keys(data[0]).forEach(key => {
            const th = document.createElement('th');
            th.textContent = key;
            header.appendChild(th);
          });
          table.appendChild(header);
          // Create data rows
          data.forEach(item => {
            const row = document.createElement('tr');
            Object.values(item).forEach(value => {
              const td = document.createElement('td');
              td.textContent = value;
              row.appendChild(td);
            });
            table.appendChild(row);
          });
        });
      </script>
      <script>
      function batter_filter() {
        var input, filter, table, tr, td, i, txtValue;
        input = document.getElementById("batter_input");
        filter = input.value.toUpperCase();
        table = document.getElementById("lak_bip_table");
        tr = table.getElementsByTagName("tr");
        for (i = 0; i < tr.length; i++) {
          td = tr[i].getElementsByTagName("td")[0];
          if (td) {
            txtValue = td.textContent || td.innerText;
            if (txtValue.toUpperCase().indexOf(filter) > -1) {
              tr[i].style.display = "";
            } else {
              tr[i].style.display = "none";
            }
          }       
        }
        table = document.getElementById("lak_hit_metrics_table");
        tr = table.getElementsByTagName("tr");
        for (i = 0; i < tr.length; i++) {
          td = tr[i].getElementsByTagName("td")[0];
          if (td) {
            txtValue = td.textContent || td.innerText;
            if (txtValue.toUpperCase().indexOf(filter) > -1) {
              tr[i].style.display = "";
            } else {
              tr[i].style.display = "none";
            }
          }       
        }
      }
      </script>
      <script>
      function pitcher_filter() {
        var input, filter, table, tr, td, i, txtValue;
        input = document.getElementById("pitcher_input");
        filter = input.value.toUpperCase();
        table = document.getElementById("lak_pitch_metrics_table");
        tr = table.getElementsByTagName("tr");
        for (i = 0; i < tr.length; i++) {
          td = tr[i].getElementsByTagName("td")[0];

            txtValue = td.textContent || td.innerText;
            if (txtValue.toUpperCase().indexOf(filter) > -1) {
              tr[i].style.display = "";
            } else {
              tr[i].style.display = "none";
            }
          }       
        }
      }
      function pitch_filter() {
        var input, filter, table, tr, td, i, txtValue;
        input = document.getElementById("pitch_input");
        filter = input.value.toUpperCase();
        table = document.getElementById("lak_pitch_metrics_table");
        tr = table.getElementsByTagName("tr");
        for (i = 0; i < tr.length; i++) {
          td = tr[i].getElementsByTagName("td")[1];
          if (td) {
            txtValue = td.textContent || td.innerText;
            if (txtValue.toUpperCase().indexOf(filter) > -1) {
              tr[i].style.display = "";
            } else {
              tr[i].style.display = "none";
            }
          }       
        }
      }
      </script>
    </div>
  </body>
</html>
